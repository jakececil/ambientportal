  <style>
    :root {
      color-scheme: dark;
      background: #000;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #f4f4f4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #000;
    }

    #gestureCatcher {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: transparent;
      cursor: none;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.03em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 600ms ease;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #hint.show {
      opacity: 1;
    }

    #debug {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 40;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 12px;
      max-width: min(80vw, 760px);
      word-break: break-word;
      line-height: 1.35;
    }

    body.debug #debug {
      display: block;
    }
  </style>

    const RECENT_KEY = "ambientBacklogRecentV1";
    const RECENT_LIMIT = Math.min(200, Math.max(24, Math.floor(VIDEOS.length * 0.08)));

    if (DEBUG) document.body.classList.add("debug");

    let player = null;

    const hint = document.getElementById("hint");
    const debug = document.getElementById("debug");
    const catcher = document.getElementById("gestureCatcher");

    function log(msg) {
      if (!DEBUG) return;
      debug.innerHTML = msg;
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function showHint(message, ms = 2200) {
      hint.textContent = message;
      hint.classList.add("show");
      clearTimeout(showHint._t);
      showHint._t = setTimeout(() => hint.classList.remove("show"), ms);
    }

    function getRecent() {
      try {
        return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setRecent(list) {
      try {
        localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_LIMIT)));
      } catch {}
    }

    function pickVideo() {
      const recent = new Set(getRecent());
      let pool = VIDEOS.filter(v => !recent.has(v.id));
      if (!pool.length) pool = VIDEOS.slice();

      const pick = pool[Math.floor(Math.random() * pool.length)];
      const nextRecent = [pick.id, ...getRecent().filter(id => id !== pick.id)];
      setRecent(nextRecent);
      return pick;
    }

    function debugStatus(prefix = "loaded") {
      if (!DEBUG || !selected) return;
      const counts = Object.entries(PLAYLIST_COUNTS).map(([k,v]) => `${escapeHTML(k)}: ${v}`).join(" · ");
      log(`${prefix}<br>${escapeHTML(selected.playlist)} · ${escapeHTML(selected.title)} · ${selected.id}<br>${VIDEOS.length} videos · recent limit ${RECENT_LIMIT}<br>${counts}`);
    }

    selected = pickVideo();

    if (REDIRECT_MODE) {
      location.replace(`https://www.youtube.com/watch?v=${selected.id}`);
    }

    function requestFullScreen() {
      const target = document.documentElement;
      const fn =
        target.requestFullscreen ||
        target.webkitRequestFullscreen ||
        target.msRequestFullscreen;

      if (fn) {
        try {
          const result = fn.call(target);
          if (result && typeof result.catch === "function") {
            result.catch(() => {});
          }
        } catch {}
      }
    }

    function playVideo() {
      if (player && ready && typeof player.playVideo === "function") {
        try {
          if (MUTED && typeof player.mute === "function") player.mute();
          player.playVideo();
          assumedPlaying = true;
        } catch {}
      }
    }

    function pauseVideo() {
      if (player && ready && typeof player.pauseVideo === "function") {
        try {
          player.pauseVideo();
          assumedPlaying = false;
        } catch {}
      }
    }

    function loadAnotherVideo(reason = "next") {
      selected = pickVideo();
      currentVideoStartedAt = Date.now();
      assumedPlaying = false;

      if (player && ready && typeof player.loadVideoById === "function") {
        try {
          player.loadVideoById(selected.id);
          if (MUTED && typeof player.mute === "function") player.mute();
          showHint(`${selected.playlist}`, 1100);
          debugStatus(reason);
          return;
        } catch {}
      }

      // Fallback if iframe API is unhappy.
      location.href = location.pathname + location.search.replace(/[?&]_r=\d+/, "") + (location.search ? "&" : "?") + "_r=" + Date.now();
    }

    function togglePlayPause() {
      if (!player || !ready) return;

      let state = null;
      try {
        if (typeof player.getPlayerState === "function") {
          state = player.getPlayerState();
        }
      } catch {}

      // YouTube states: 1 playing, 2 paused, 0 ended, -1 unstarted, 3 buffering, 5 cued
      if (state === 1 || assumedPlaying) {
        pauseVideo();
        showHint("paused", 900);
      } else {
        playVideo();
        showHint("playing", 900);
      }
    }

    function primaryInput(source = "input") {
      const now = Date.now();
      if (now - lastInputAt < 180) return;
      lastInputAt = now;

      if (stage === 0) {

        debugStatus(`input: ${source} · play`);
        return;
      }

      togglePlayPause();
      debugStatus(`input: ${source} · toggle`);
    }

      location.href = location.pathname + clean + (clean ? "&" : "?") + "_r=" + Date.now();
    }

    function keyHandler(e) {
      const key = (e.key || "").toLowerCase();
      const code = (e.code || "").toLowerCase();

      const primaryKeys = new Set([
        " ",
        "spacebar",
        "enter",
        "f",
        "p",
        "x"
      ]);

      if (primaryKeys.has(key) || primaryKeys.has(code) || code === "space") {
        e.preventDefault();
        e.stopPropagation();
        primaryInput(`key:${e.key || e.code}`);
      }

      if (key === "r") {
        e.preventDefault();
        e.stopPropagation();
        refreshForShuffle();
      }
    }

    ["click", "pointerdown", "mousedown", "touchstart"].forEach(type => {
      window.addEventListener(type, (e) => {
        if (stage < 2) {
          e.preventDefault();
          e.stopPropagation();
        }
        primaryInput(type);
      }, { passive: false, capture: true });
    });

    window.addEventListener("keydown", keyHandler, { capture: true });
    window.addEventListener("keyup", keyHandler, { capture: true });

    const gamepadState = {};

    function pollGamepads() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) {
        if (!pad) continue;
        pad.buttons.forEach((button, index) => {
          const key = `${pad.index}:${index}`;
          const pressed = !!button.pressed;
          const was = !!gamepadState[key];
          if (pressed && !was) {
            if (index === 0 || index === 2 || index === 9) primaryInput(`gamepad:${index}`);
            if (index === 3) refreshForShuffle();
          }
          gamepadState[key] = pressed;
        });
      }
      requestAnimationFrame(pollGamepads);
    }

    window.addEventListener("gamepadconnected", () => {
      debugStatus("gamepad connected");
      pollGamepads();
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: selected.id,
        playerVars: {
          autoplay: 1,
          mute: MUTED ? 1 : 0,
          controls: 1,
          modestbranding: 1,
          rel: 0,
          playsinline: 0,
          fs: 1,
          iv_load_policy: 3,
          origin: location.origin
        },
        events: {
          onReady: function(event) {
            ready = true;
            try {
              if (MUTED) event.target.mute();
              event.target.playVideo();
            } catch {}
            showHint("press once for fullscreen · again for play/pause", 2600);
            debugStatus("ready");
          },
          onStateChange: function(event) {
            if (event.data === 1) {
              assumedPlaying = true;
              currentVideoStartedAt = Date.now();
            }
            if (event.data === 2) assumedPlaying = false;
            if (event.data === 0) {
              assumedPlaying = false;
              // Load the next random pick inside the same player. This should preserve page fullscreen better than full page refresh.
              setTimeout(() => loadAnotherVideo("ended → next"), 550);
            }
          },
          onError: function(event) {
            debugStatus(`YouTube error ${event.data}`);
            showHint("video error · trying another", 1200);
            setTimeout(() => loadAnotherVideo(`error ${event.data} → next`), 1400);
          }
        }
      });
    };

    if (navigator.getGamepads) requestAnimationFrame(pollGamepads);
  </script>
</body>
</html>
