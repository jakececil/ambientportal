<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Future Fort Randomizer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --fg: #f5f3ea;
      --muted: #aaa49a;
      --panel: rgba(255,255,255,0.075);
      --panel2: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(87,113,255,0.18), transparent 35%),
        radial-gradient(circle at 80% 100%, rgba(255,181,67,0.12), transparent 38%),
        var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    #playerWrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: grid;
      place-items: center;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    #fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      padding: 28px;
      background: linear-gradient(145deg, rgba(0,0,0,0.82), rgba(15,15,22,0.96));
    }
    .card {
      max-width: 760px;
      padding: 26px;
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 18px 70px rgba(0,0,0,0.45);
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 5vw, 54px);
      letter-spacing: -0.04em;
      line-height: 0.94;
    }
    p {
      color: var(--muted);
      line-height: 1.45;
      margin: 8px 0 0;
    }
    #controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 8px;
      border-radius: 20px;
      background: rgba(0,0,0,0.36);
      backdrop-filter: blur(14px);
      opacity: 0.18;
      transition: opacity 180ms ease;
    }
    #controls:hover, #controls:focus-within { opacity: 1; }
    button, a.button {
      border: 0;
      text-decoration: none;
      color: var(--fg);
      background: var(--panel2);
      padding: 11px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    button:active, a.button:active { transform: scale(0.98); }
    #now {
      min-width: min(100%, 340px);
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 4px;
    }
    @media (max-width: 720px) {
      #controls {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
      }
      #now { min-width: 240px; }
    }
  </style>
</head>
<body>
  <div id="shell">
    <main id="playerWrap">
      <iframe id="player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
        title="Future Fort random YouTube player"></iframe>

      <div id="fallback">
        <div class="card">
          <h1>Future Fort</h1>
          <p id="fallbackText">Choosing a random architecture video...</p>
          <p style="margin-top:16px;">If the embed gets weird, use “Open YouTube.” Tasker can also launch this page with <code>?mode=redirect</code>.</p>
        </div>
      </div>
    </main>

    <nav id="controls" aria-label="Controls">
      <button id="shuffleBtn">Shuffle</button>
      <button id="fullscreenBtn">Fullscreen</button>
      <a id="openBtn" class="button" target="_blank" rel="noopener">Open YouTube</a>
      <button id="copyBtn">Copy URL</button>
      <span id="now"></span>
    </nav>
  </div>

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode") || "embed"; // embed | redirect
    const avoidRecent = Math.max(0, Number(params.get("avoid") || 12));
    const startSeconds = Math.max(0, Number(params.get("t") || 0)); // optional fixed start time
    const autoplay = params.get("autoplay") !== "0";
    const mute = params.get("mute") === "1"; // useful for browser autoplay testing

    function randomIndex(max) {
      if (crypto && crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        return arr[0] % max;
      }
      return Math.floor(Math.random() * max);
    }

    function pickVideo() {
      const key = "futureFortRecentIds";
      let recent = [];
      try { recent = JSON.parse(localStorage.getItem(key) || "[]"); } catch (e) {}

      let candidates = PLAYLIST.videos.filter(v => !recent.includes(v.id));
      if (!candidates.length) candidates = PLAYLIST.videos;

      const pick = candidates[randomIndex(candidates.length)];

      recent = [pick.id, ...recent.filter(id => id !== pick.id)].slice(0, avoidRecent);
      try { localStorage.setItem(key, JSON.stringify(recent)); } catch (e) {}

      return pick;
    }

    function youtubeWatchUrl(video) {
      const url = new URL("https://www.youtube.com/watch");
      url.searchParams.set("v", video.id);
      if (startSeconds > 0) url.searchParams.set("t", String(startSeconds) + "s");
      return url.toString();
    }

    function youtubeEmbedUrl(video) {
      const url = new URL(`https://www.youtube.com/embed/${video.id}`);
      url.searchParams.set("autoplay", autoplay ? "1" : "0");
      url.searchParams.set("playsinline", "1");
      url.searchParams.set("rel", "0");
      url.searchParams.set("modestbranding", "1");
      if (mute) url.searchParams.set("mute", "1");
      if (startSeconds > 0) url.searchParams.set("start", String(startSeconds));
      return url.toString();
    }

    const video = pickVideo();
    const watch = youtubeWatchUrl(video);
    const embed = youtubeEmbedUrl(video);

    document.getElementById("now").textContent = `${PLAYLIST.name} • ${video.title} • ${video.id}`;
    document.getElementById("openBtn").href = watch;
    document.getElementById("fallbackText").textContent = `Chosen: ${video.title}`;

    if (mode === "redirect") {
      location.replace(watch);
    } else {
      const frame = document.getElementById("player");
      frame.src = embed;
      setTimeout(() => {
        document.getElementById("fallback").style.display = "none";
      }, 1000);
    }

    document.getElementById("shuffleBtn").addEventListener("click", () => {
      const next = new URL(location.href);
      next.searchParams.set("_", Date.now().toString());
      location.href = next.toString();
    });

    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      const target = document.getElementById("playerWrap");
      try {
        if (document.fullscreenElement) await document.exitFullscreen();
        else await target.requestFullscreen();
      } catch (e) {
        alert("Fullscreen needs a direct tap or may be blocked by this browser.");
      }
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(watch);
        document.getElementById("copyBtn").textContent = "Copied";
        setTimeout(() => document.getElementById("copyBtn").textContent = "Copy URL", 900);
      } catch (e) {
        prompt("Copy this URL:", watch);
      }
    });
