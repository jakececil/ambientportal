<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Future Fort Randomizer</title>
  <style>
    :root {
      color-scheme: dark;
      background: #000;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #f4f4f4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #000;
    }

    /*
      This transparent input catcher is deliberately huge.
      It lets the page receive a real user gesture before giving control
      back to the YouTube iframe. First input fullscreen. Later input play/pause.
    */
    #gestureCatcher {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: transparent;
      cursor: none;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.03em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 600ms ease;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    #hint.show {
      opacity: 1;
    }

    #debug {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 40;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 12px;
      max-width: min(70vw, 520px);
      word-break: break-word;
    }

    body.debug #debug {
      display: block;
    }
  </style>
</head>
<body>

    <div id="player"></div>
  </main>

  <div id="gestureCatcher" aria-label="Press or tap for fullscreen and playback"></div>

    { id: "U0bHhmpyKGg", title: "Future Fort · U0bHhmpyKGg" },
    { id: "kjn4rgevnCc", title: "Future Fort · kjn4rgevnCc" },
    { id: "-j2t1G32lQs", title: "Future Fort · -j2t1G32lQs" },
    { id: "Qpl2JCkorCM", title: "Future Fort · Qpl2JCkorCM" },
    { id: "NnKHpMplFbg", title: "Future Fort · NnKHpMplFbg" },
    { id: "xEahf8NgX3U", title: "Future Fort · xEahf8NgX3U" },
    { id: "9cXZ5vIwpOQ", title: "Future Fort · 9cXZ5vIwpOQ" }
    ];

    const params = new URLSearchParams(location.search);
    const REDIRECT_MODE = params.get("mode") === "redirect";
    const DEBUG = params.get("debug") === "1";
    const MUTED = params.get("mute") === "1";
    const RECENT_KEY = "futureFortRecentV4";
    const RECENT_LIMIT = 12;

    if (DEBUG) document.body.classList.add("debug");

    let player = null;
    let selected = null;
    let stage = 0; // 0 = needs fullscreen, 1 = needs play, 2 = toggle play/pause
    let ready = false;
    let assumedPlaying = false;
    let lastInputAt = 0;

    const hint = document.getElementById("hint");
    const debug = document.getElementById("debug");
    const catcher = document.getElementById("gestureCatcher");

    function log(msg) {
      debug.textContent = msg;
    }

    function showHint(message, ms = 2200) {
      hint.textContent = message;
      hint.classList.add("show");
      clearTimeout(showHint._t);
      showHint._t = setTimeout(() => hint.classList.remove("show"), ms);
    }

    function getRecent() {
      try {
        return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setRecent(list) {
      try {
        localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_LIMIT)));
      } catch {}
    }

    function pickVideo() {
      const recent = new Set(getRecent());
      let pool = VIDEOS.filter(v => !recent.has(v.id));
      if (!pool.length) pool = VIDEOS.slice();

      const pick = pool[Math.floor(Math.random() * pool.length)];
      const nextRecent = [pick.id, ...getRecent().filter(id => id !== pick.id)];
      setRecent(nextRecent);
      return pick;
    }

    selected = pickVideo();

    if (REDIRECT_MODE) {
      location.replace(`https://www.youtube.com/watch?v=${selected.id}`);
    }

    function requestFullScreen() {
      const target = document.documentElement;
      const fn =
        target.requestFullscreen ||
        target.webkitRequestFullscreen ||
        target.msRequestFullscreen;

      if (fn) {
        try {
          const result = fn.call(target);
          if (result && typeof result.catch === "function") {
            result.catch(() => {});
          }
        } catch {}
      }
    }

    function playVideo() {
      if (player && ready && typeof player.playVideo === "function") {
        try {
          if (MUTED && typeof player.mute === "function") player.mute();
          player.playVideo();
          assumedPlaying = true;
        } catch {}
      }
    }

    function pauseVideo() {
      if (player && ready && typeof player.pauseVideo === "function") {
        try {
          player.pauseVideo();
          assumedPlaying = false;
        } catch {}
      }
    }

    function togglePlayPause() {
      if (!player || !ready) return;

      let state = null;
      try {
        if (typeof player.getPlayerState === "function") {
          state = player.getPlayerState();
        }
      } catch {}

      // YouTube states: 1 playing, 2 paused, 0 ended, -1 unstarted, 3 buffering, 5 cued
      if (state === 1 || assumedPlaying) {
        pauseVideo();
        showHint("paused", 900);
      } else {
        playVideo();
        showHint("playing", 900);
      }
    }

    function primaryInput(source = "input") {
      const now = Date.now();
      if (now - lastInputAt < 180) return; // debounce noisy controller/pointer events
      lastInputAt = now;

      log(`${source} · stage ${stage} · ${selected.id}`);

      if (stage === 0) {
        requestFullScreen();
        stage = 1;
        showHint("fullscreen · press again to play", 1300);
        return;
      }

      if (stage === 1) {
        playVideo();
        stage = 2;
        catcher.style.pointerEvents = "none";
        showHint("playing", 900);
        return;
      }

      togglePlayPause();
    }

    function refreshForShuffle() {
      location.href = location.pathname + location.search.replace(/[?&]_r=\d+/, "") + (location.search ? "&" : "?") + "_r=" + Date.now();
    }

    function keyHandler(e) {
      const key = (e.key || "").toLowerCase();
      const code = (e.code || "").toLowerCase();

      const primaryKeys = new Set([
        " ",
        "spacebar",
        "enter",
        "f",
        "p",
        "x"
      ]);

      if (primaryKeys.has(key) || primaryKeys.has(code) || code === "space") {
        e.preventDefault();
        e.stopPropagation();
        primaryInput(`key:${e.key || e.code}`);
      }

      // Desktop convenience. Odin's Y/refresh behavior is browser-level and may not hit this.
      if (key === "r") {
        e.preventDefault();
        e.stopPropagation();
        refreshForShuffle();
      }
    }

    ["click", "pointerdown", "mousedown", "touchstart"].forEach(type => {
      window.addEventListener(type, (e) => {
        // Let the iframe receive normal clicks after fullscreen/play ritual is complete.
        if (stage < 2) {
          e.preventDefault();
          e.stopPropagation();
        }
        primaryInput(type);
      }, { passive: false, capture: true });
    });

    window.addEventListener("keydown", keyHandler, { capture: true });
    window.addEventListener("keyup", keyHandler, { capture: true });

    // Conservative gamepad support for PC context. Android may ignore this.
    const gamepadState = {};

    function pollGamepads() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) {
        if (!pad) continue;
        pad.buttons.forEach((button, index) => {
          const key = `${pad.index}:${index}`;
          const pressed = !!button.pressed;
          const was = !!gamepadState[key];
          if (pressed && !was) {
            // Most controllers: 0=A, 2=X, 9=Start.
            if (index === 0 || index === 2 || index === 9) primaryInput(`gamepad:${index}`);
            // Desktop convenience: Y often index 3 -> refresh/shuffle.
            if (index === 3) refreshForShuffle();
          }
          gamepadState[key] = pressed;
        });
      }
      requestAnimationFrame(pollGamepads);
    }

    window.addEventListener("gamepadconnected", () => {
      log("gamepad connected");
      pollGamepads();
    });

    // Load YouTube IFrame API
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: selected.id,
        playerVars: {
          autoplay: 1,
          mute: MUTED ? 1 : 0,
          controls: 1,
          modestbranding: 1,
          rel: 0,
          playsinline: 0,
          fs: 1,
          iv_load_policy: 3,
          origin: location.origin
        },
        events: {
          onReady: function(event) {
            ready = true;
            try {
              if (MUTED) event.target.mute();
              event.target.playVideo();
            } catch {}
            showHint("press once for fullscreen · again for play/pause", 2600);
            log(`loaded ${selected.id}`);
          },
          onStateChange: function(event) {
            if (event.data === 1) assumedPlaying = true;
            if (event.data === 2 || event.data === 0) assumedPlaying = false;
          },
          onError: function(event) {
            log(`YouTube error ${event.data} on ${selected.id}`);
            showHint("video error · refreshing", 1200);
            setTimeout(refreshForShuffle, 1400);
          }
        }
      });
    };

    // Start polling even without gamepadconnected because some browsers miss the event.
    if (navigator.getGamepads) requestAnimationFrame(pollGamepads);
  </script>
